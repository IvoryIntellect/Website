<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài Khoản</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">HTML5</div>
        <ul class="nav-links">
            <li><a href="website.html">Trang chủ</a></li>
            <li><a href="about.html">Về Nhóm</a></li>
            <li><a href="login.html" id="login-link">Đăng Nhập</a></li>
        </ul>
    </nav>

    <div class="login-container" id="login-section">
        <div class="box login-box">
            <h2>Đăng Nhập</h2>
            <form id="login-form">
                <div class="input-group">
                    <input type="text" id="username" placeholder="Tên đăng nhập" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Mật khẩu" required>
                </div>
                <button type="submit" class="btn-login">Đăng nhập</button>
            </form>
            <div class="signup-link">
                Chưa có tài khoản? <a href="signup.html">Tạo tài khoản ngay</a>
            </div>
        </div>
    </div>

    <div id="welcome-section" style="display: none;">
        <div class="dashboard-container">
            
            <div class="sidebar-column">
                <div class="box info-sidebar">
                    <h3>Hồ Sơ Cá Nhân</h3>
                    <div class="info-item"><span class="info-label">Họ tên:</span> <span id="display-fullname">...</span></div>
                    <div class="info-item"><span class="info-label">Username:</span> <span id="display-username">...</span></div>
                    <div class="info-item"><span class="info-label">Ngày đăng ký:</span> <span id="display-reg-date">...</span></div>
                </div>

                <div class="box history-sidebar">
                    <h3>Lịch sử và IP</h3>
                    <div class="info-item">
                        <span class="info-label">IP hiện tại:</span> <span id="current-ip" class="ip-text">Đang lấy...</span>
                    </div>
                    <p class="info-label" style="margin-bottom: 5px;">3 lần đăng nhập gần nhất:</p>
                    <ul id="history-list" class="history-list"></ul>
                </div>
            </div>

            <div class="box main-dashboard">
                <h2 id="welcome-msg">Chào mừng!</h2>
                <p id="login-time" style="font-family: 'Nunito', sans-serif; font-size: 14px; color: #666; margin-bottom: 5px;"></p>
                <p id="session-timer" style="font-family: 'Nunito', sans-serif; font-size: 14px; color: #ff9a9e; font-weight: bold; margin-bottom: 20px;"></p>
                <button onclick="logout()" class="btn-logout">Đăng xuất</button>
            </div>

        </div>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const loginLink = document.getElementById('login-link');
        const loginSection = document.getElementById('login-section');
        const welcomeSection = document.getElementById('welcome-section');
        const historyList = document.getElementById('history-list');
        const currentIpDisplay = document.getElementById('current-ip');
        
        let timerInterval;

        window.onload = function() {
            const savedUser = localStorage.getItem('loggedInUser');
            if (savedUser) {
                updateUI(savedUser, localStorage.getItem('loginTimeStr'));
                startTimer(localStorage.getItem('loginTimestamp'));
            }
        };

        async function fetchIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                return "127.0.0.1 (Local)";
            }
        }

        loginForm.onsubmit = async function(e) {
            e.preventDefault();
            const userInput = document.getElementById('username').value;
            const passInput = document.getElementById('password').value;

            const allAccounts = JSON.parse(localStorage.getItem('allAccounts')) || [];
            const userFound = allAccounts.find(u => u.username === userInput && u.password === passInput);

            if (userFound) {
                const now = new Date();
                const timeString = now.toLocaleString('vi-VN');
                const ip = await fetchIP();

                if (!userFound.login_history) userFound.login_history = [];
                userFound.login_history.unshift({ time: timeString, ip: ip });
                if (userFound.login_history.length > 3) userFound.login_history.pop();

                localStorage.setItem('allAccounts', JSON.stringify(allAccounts));
                localStorage.setItem('loggedInUser', userInput);
                localStorage.setItem('loginTimestamp', now.getTime());
                localStorage.setItem('loginTimeStr', timeString);
                
                updateUI(userInput, timeString);
                startTimer(now.getTime());
            } else {
                alert("Sai thông tin!");
            }
        };

        function updateUI(username, time) {
            const allAccounts = JSON.parse(localStorage.getItem('allAccounts')) || [];
            const user = allAccounts.find(u => u.username === username);

            if (!user) return;

            loginLink.innerText = username; 
            loginSection.style.display = 'none';
            welcomeSection.style.display = 'block';
            
            document.getElementById('display-fullname').innerText = user.fullname;
            document.getElementById('display-username').innerText = user.username;
            document.getElementById('display-reg-date').innerText = user.signup_date || "Thành viên mới";
            document.getElementById('welcome-msg').innerText = "Xin Chào, " + user.fullname + "!";
            document.getElementById('login-time').innerText = "Đăng nhập lúc: " + time;

            fetchIP().then(ip => currentIpDisplay.innerText = ip);
            
            historyList.innerHTML = "";
            if (user.login_history) {
                user.login_history.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'history-item';
                    li.innerHTML = `📅 ${item.time} <br> 🌐 IP: <span class="ip-text">${item.ip}</span>`;
                    historyList.appendChild(li);
                });
            }
        }

        function startTimer(startTime) {
            if (!startTime) return;
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const now = new Date().getTime();
                const diff = now - startTime;
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('session-timer').innerText = `Thời gian đã truy cập: ${h}h ${m}m ${s}s`;
            }, 1000);
        }

        function logout() {
            localStorage.removeItem('loggedInUser');
            localStorage.removeItem('loginTimestamp');
            localStorage.removeItem('loginTimeStr');
            location.reload();
        }
    </script>
</body>
</html>
