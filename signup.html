<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<nav class="navbar">
    <div class="logo">HTML5</div>
    <ul class="nav-links">
        <li><a href="index.html">Trang chủ</a></li>
        <li><a href="about.html">Về Nhóm</a></li>
        <li><a href="login.html" id="login-link">Đăng Nhập</a></li>
    </ul>
</nav>

<div class="login-container">
    <div class="box login-box" style="height: auto; padding: 30px;">
        <h2>Đăng Ký Tài Khoản</h2>
        <form id="signup-form">
            <div class="input-group">
                <input type="text" id="fullname" placeholder="Họ và tên" required>
            </div>
            <div class="input-group">
                <input type="text" id="username" placeholder="Tên hiển thị (username)" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Mật khẩu" required minlength="8">
            </div>
            <div class="input-group">
                <input type="password" id="confirm-password" placeholder="Nhập lại mật khẩu" required>
            </div>
            <button type="submit" class="btn-login">Đăng ký</button>
        </form>
        <div class="signup-link">
            Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a>
        </div>
    </div>
</div>

<script>
    const INITIAL_ACCOUNTS = [
        { "username": "admin", "password": "123", "fullname": "Quản trị viên", "last_login": "", "last_logout": "", "last_session": "" }
    ];

    window.onload = function() {
        if (!localStorage.getItem('allAccounts')) {
            localStorage.setItem('allAccounts', JSON.stringify(INITIAL_ACCOUNTS));
        }
        const savedUser = localStorage.getItem('loggedInUser');
        const loginLink = document.getElementById('login-link');
        if (savedUser && loginLink) {
            loginLink.innerText = savedUser;
        }
    };

    const signupForm = document.getElementById('signup-form');

    signupForm.onsubmit = function(e) {
        e.preventDefault();

        const fullname = document.getElementById('fullname').value;
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;
        if (password !== confirmPassword) {
            alert("Mật khẩu nhập lại không khớp!");
            return;
        }
        let allAccounts = JSON.parse(localStorage.getItem('allAccounts'));
        const userExists = allAccounts.find(u => u.username === username);
        if (userExists) {
            alert("Tên đăng nhập này đã tồn tại. Vui lòng chọn tên khác!");
            return;
        }
        const newUser = {
            "username": username,
            "password": password,
            "fullname": fullname,
            "last_login": "",
            "last_logout": "",
            "last_session": ""
        };

        allAccounts.push(newUser);
        localStorage.setItem('allAccounts', JSON.stringify(allAccounts));

        alert("Đăng ký thành công! Bạn có thể đăng nhập ngay bây giờ.");
        window.location.href = "login.html";
    };
</script>
</body>
</html>
